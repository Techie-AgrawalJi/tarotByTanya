kind = "web"
previewPath = "/"
title = "Astrology & Spiritual Readings"
version = "1.0.0"
id = "artifacts/astrology-site"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25831

[services.development]
run = "pnpm --filter @workspace/astrology-site run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/astrology-site", "run", "build" ]
publicDir = "artifacts/astrology-site/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25831"
BASE_PATH = "/"
